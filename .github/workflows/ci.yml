name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest test_app.py -v

      - name: Run pip-audit dependency scan
        run: |
          pip install pip-audit
          pip-audit --desc

      - name: SonarQube code scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: "https://sonarcloud.io"

      - name: Build Docker image
        run: |
          docker build -t devsecops-app:latest .

      - name: Smoke test Docker image
        run: |
          docker run -d -p 5000:5000 --name smoke-test devsecops-app:latest
          sleep 5
          curl -f http://localhost:5000/health
          docker stop smoke-test
          docker rm smoke-test

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: devsecops-app:latest
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Start app for ZAP scan
        run: |
          python3 app.py &
          sleep 5
          curl http://localhost:5000/health

      - name: Run OWASP ZAP baseline scan
        run: |
          docker run --network host \
            -v $(pwd):/zap/wrk \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:5000 \
            -I \
            --autooff
